<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>CB | Cadastro</title>

    <script src="./js/sessao.js"></script>

    <link rel="stylesheet" href="./css/estilo.css" />
    <link rel="icon" href="./assets/icon/icone.ico" />
    <link rel="preconnect" href="https://fonts.gstatic.com" />
  </head>

  <body onload="listar()">
    <!--header inicio-->
    <div class="header">
      <div class="container">
        <h1 class="titulo">CHUTE BOXE ★</h1>
        <ul class="navbar">
          <li>
            <a href="index.html">Início</a>
          </li>
          <li>|</li>
          <li>
            <a href="login.html">Login</a>
          </li>
          <li class="agora">
            <a href="#">Cadastro</a>
          </li>
        </ul>
      </div>
    </div>
    <!--header fim-->

    <div class="login">
      <div class="alerta_erro">
        <div class="card_erro" id="cardErro">
          <span id="mensagem_erro"></span>
        </div>
      </div>
      <div class="container">
        <div class="card card-cadastro">
          <h2>Bem-vindo!</h2>
          <div class="formulario">
            <div class="campo">
              <span>Nome:</span>
              <input id="nome_input" type="text" placeholder="Seu nome" />
            </div>
            <div class="campo">
              <span>E-mail:</span>
              <input
                id="email_input"
                type="text"
                placeholder="meuemail@provedor.com"
              />
            </div>
            <div class="campo">
              <span>Senha:</span>
              <input id="senha_input" type="password" placeholder="******" />
            </div>
            <div class="campo">
              <span>Confirmação da Senha:</span>
              <input
                id="confirmacao_senha_input"
                type="password"
                placeholder="******"
              />
            </div>
            <div class="campo">
              <span>Academia frequentada:</span>
              <select id="academia_input">
                <option value="">Treino em casa</option>
              </select>
            </div>
            <span>Gênero:</span>
            <div class="campo_radio">
              <input
                class="input-radio"
                type="radio"
                id="id_masculino"
                name="genero"
                value="M"
              />
              <label for="id_masculino">
                <div class="radio-btn"></div>
                <span>Masculino</span>
              </label>

              <input
                class="input-radio"
                type="radio"
                id="id_feminino"
                name="genero"
                value="F"
              />
              <label for="id_feminino">
                <div class="radio-btn"></div>
                <span>Feminino</span>
              </label>

              <input
                class="input-radio"
                type="radio"
                id="id_outro"
                name="genero"
                value="O"
              />
              <label for="id_outro">
                <div class="radio-btn"></div>
                <span>Outro</span>
              </label>
            </div>
            <button class="botao" onclick="cadastrar()">Cadastrar</button>
          </div>
          <div id="div_aguardar" class="loading-div">
            <img src="./assets/circle-loading.gif" id="loading-gif" />
          </div>

          <div id="div_erros_login"></div>
        </div>
      </div>
    </div>

    <!--footer inicio-->
    <div class="footer">
      <div class="container">
        <h4>CHUTE BOXE, HEY &starf; SPTech &copy; 2026</h4>
      </div>
    </div>
    <!--footer fim-->
  </body>
</html>

<script>

  function listar() {
    fetch("/academia/listar", {
        method: "GET",
    })
    .then(function (resposta) {
        resposta.json().then(function (academias) {
            academias.forEach(function (academia) {
                var option = document.createElement("option");
                option.value = academia.nome;
                option.text = academia.nome;
                academia_input.appendChild(option);
            });
        });
    })
    .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
    });
}

  function cadastrar() {
    var nomeVar = nome_input.value;
    var emailVar = email_input.value;
    var senhaVar = senha_input.value;
    var confirmacaoSenhaVar = confirmacao_senha_input.value;
    var academiaVar = academia_input.value || null;
    var generoVar = document.querySelector(
      'input[name="genero"]:checked',
    )?.value;

    if (
      nomeVar == "" ||
      emailVar == "" ||
      senhaVar == "" ||
      confirmacaoSenhaVar == "" ||
      !generoVar
    ) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML = "(Preencha todos os campos corretamente)";
      finalizarAguardar();
      return false;
    } else {
      setInterval(sumirMensagem, 5000);
    }

    fetch("/usuarios/cadastrar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        nomeServer: nomeVar,
        emailServer: emailVar,
        senhaServer: senhaVar,
        generoServer: generoVar,
        academiaServer: academiaVar,
      }),
    })
      .then(function (resposta) {
        console.log("resposta: ", resposta);

        if (resposta.ok) {
          cardErro.style.display = "block";
          mensagem_erro.innerHTML =
            "Cadastro realizado com sucesso! Redirecionando para tela de Login...";

          setTimeout(() => {
            window.location = "login.html";
          }, "2000");

          limparFormulario();
          finalizarAguardar();
        } else {
          throw "Houve um erro ao tentar realizar o cadastro!";
        }
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
        finalizarAguardar();
      });

    return false;
  }

  function sumirMensagem() {
    cardErro.style.display = "none";
  }
</script>
